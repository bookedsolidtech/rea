# .rea/policy.yaml — dogfood install for @bookedsolid/rea itself.
# rea's own governance layer enforces rea's own commit, hook, and attribution rules.
# This file is the canonical example policy for the "bst-internal" profile.
version: "1"
profile: "bst-internal"
installed_by: "rea@0.1.0 (self-hosted dogfood)"
installed_at: "2026-04-18T00:00:00Z"
autonomy_level: L1
max_autonomy_level: L2
promotion_requires_human_approval: true
block_ai_attribution: true
blocked_paths:
  - .env
  - .env.*
  - .rea/HALT
  - .github/workflows/release.yml
  # 0.49.0 — gates Write/Edit/MultiEdit/NotebookEdit tool calls
  # targeting `package.json`. The bootstrap allowlist passes a
  # CLI-missing PM payload through only when `package.json`
  # declares `@bookedsolid/rea`, so blocking AGENT edits to the
  # manifest narrows the Edit/Write-tier forge surface. PM-induced
  # writes to the manifest are explicitly out of scope (see
  # THREAT_MODEL.md §5.23 "Out of scope") — a path-based blocklist
  # cannot distinguish agent edits from PM-tool writes. The static
  # manifest-write detector that would close that gap was
  # deliberately removed in R17 (scope-cut); defending against
  # agent-initiated PM mutations needs a different abstraction.
  - package.json
notification_channel: ""
context_protection:
  delegate_to_subagent:
    - pnpm run build
    - pnpm run test
    - pnpm run lint
  max_bash_output_lines: 100
review:
  concerns_blocks: true
  codex_required: false
  # 0.16.1+: pin the rea repo to the iron-gate codex defaults so any P1
  # in the canonical hooks gets caught against this repo at the SAME
  # reasoning level helix and BST run their consumer push-gates at.
  # Pre-fix, rea was running its own pre-publish review at codex CLI
  # defaults (codex-auto-review at medium) — meaningfully weaker than
  # the consumers — which is why their push-gates kept catching things
  # rea pre-publish missed across the helix-014 / 015 / 016 cycle.
  codex_model: gpt-5.4
  codex_reasoning_effort: high
# 0.36.0 charter item 2 — dogfood `policy.delegation_advisory.enabled: true`.
# 0.31.0 introduced the delegation-advisory hook (PostToolUse on matcher
# `Bash|Edit|Write|MultiEdit|NotebookEdit`); the policy gate stayed
# `false` by default to give consumers an opt-in window. 0.31.0 round-4
# P3 noted that rea's OWN dogfood didn't turn the gate on either — every
# other security/governance posture this repo ships is dogfooded, this
# one wasn't. 0.36.0 closes that gap. Threshold is the schema default
# (25 write-class calls) — see `DelegationAdvisoryPolicySchema` in
# `src/policy/loader.ts`. Exempt list mirrors the schema default so an
# explicit policy block doesn't accidentally narrow the set vs the
# default.
delegation_advisory:
  enabled: true
  threshold: 25
  exempt_subagents:
    - general-purpose
    - Explore
    - Plan
    - output-style-setup
    - statusline-setup
# 0.49.0 bootstrap allowlist — explicit `enabled: true` so the dogfood
# install advertises the default rather than relying on the schema
# default. The bash-tier gate consults this field via inline node before
# the canonical policy reader is reachable (the whole reason it runs is
# CLI-missing).
bootstrap_allowlist:
  enabled: true
