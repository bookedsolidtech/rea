# .rea/policy.yaml — dogfood install for @bookedsolid/rea itself.
# rea's own governance layer enforces rea's own commit, hook, and attribution rules.
# This file is the canonical example policy for the "bst-internal" profile.
version: "1"
profile: "bst-internal"
installed_by: "rea@0.1.0 (self-hosted dogfood)"
installed_at: "2026-04-18T00:00:00Z"
autonomy_level: L1
max_autonomy_level: L2
promotion_requires_human_approval: true
block_ai_attribution: true
blocked_paths:
  - .env
  - .env.*
  - .rea/policy.yaml
  - .rea/HALT
  - CODEOWNERS
  - .github/workflows/release.yml
  - SECURITY.md
  - THREAT_MODEL.md
notification_channel: ""
context_protection:
  delegate_to_subagent:
    - pnpm run build
    - pnpm run test
    - pnpm run lint
  max_bash_output_lines: 100
