# .rea/policy.yaml — dogfood install for @bookedsolid/rea itself.
# rea's own governance layer enforces rea's own commit, hook, and attribution rules.
# This file is the canonical example policy for the "bst-internal" profile.
version: "1"
profile: "bst-internal"
installed_by: "rea@0.1.0 (self-hosted dogfood)"
installed_at: "2026-04-18T00:00:00Z"
autonomy_level: L1
max_autonomy_level: L2
promotion_requires_human_approval: true
block_ai_attribution: true
blocked_paths:
  - .env
  - .env.*
  - .rea/HALT
  - .github/workflows/release.yml
notification_channel: ""
context_protection:
  delegate_to_subagent:
    - pnpm run build
    - pnpm run test
    - pnpm run lint
  max_bash_output_lines: 100
review:
  codex_required: false
  # 0.16.1+: pin the rea repo to the iron-gate codex defaults so any P1
  # in the canonical hooks gets caught against this repo at the SAME
  # reasoning level helix and BST run their consumer push-gates at.
  # Pre-fix, rea was running its own pre-publish review at codex CLI
  # defaults (codex-auto-review at medium) — meaningfully weaker than
  # the consumers — which is why their push-gates kept catching things
  # rea pre-publish missed across the helix-014 / 015 / 016 cycle.
  codex_model: gpt-5.4
  codex_reasoning_effort: high
