# profiles/open-source-no-codex.yaml
#
# open-source variant with Codex adversarial review disabled.
#
# Same governance settings as `open-source.yaml` — L1 autonomy with an L2
# ceiling, the same blocked-paths list (sensitive release and disclosure
# files flagged for human-only edits). The only difference: the installed
# `.rea/policy.yaml` will carry `review.codex_required: false`.
#
# Pick this variant when:
#   - Your public OSS project does not have a Codex account or does not
#     want to require one from every contributor.
#   - Contributors are expected to run a locally-hosted adversarial review
#     instead (Claude self-review is the shipped fallback).
#
# To re-enable Codex later, edit `.rea/policy.yaml` and set
# `review.codex_required: true` (or remove the field entirely — true is
# the documented default).
autonomy_level: L1
max_autonomy_level: L2
promotion_requires_human_approval: true
block_ai_attribution: true
blocked_paths:
  - .env
  - .env.*
  - .rea/policy.yaml
  - .rea/HALT
  - CODEOWNERS
  - LICENSE
  - SECURITY.md
  - .github/workflows/release.yml
  - .github/workflows/publish.yml
notification_channel: ''
# 0.30.0 attribution augmenter — opt-in.
# Husky prepare-commit-msg hook appends a Co-Authored-By trailer to
# every commit when enabled. Profile defaults are off — opt in
# per-repo via .rea/policy.yaml because the identity is per-developer.
# attribution:
#   co_author:
#     enabled: true
#     name: 'Your Name'
#     email: 'you@example.com'
#     skip_merge: false
attribution:
  co_author:
    enabled: false
# 0.31.0 delegation-advisory nudge — disabled for open-source-no-codex.
# The delegation-advisory.sh PostToolUse hook emits a one-time stderr
# advisory when a session crosses `threshold` write-class tool calls
# without dispatching a curated specialist. "You should delegate more"
# is an opinion not every OSS team shares, so external profiles ship
# `enabled: false` — opt in per-repo via .rea/policy.yaml:
#   delegation_advisory:
#     enabled: true
#     threshold: 25
delegation_advisory:
  enabled: false
