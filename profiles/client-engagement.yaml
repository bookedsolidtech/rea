# profiles/client-engagement.yaml
# Zero-trust client projects. Starts at the lowest meaningful autonomy level,
# max ceiling held at L1 — promotion requires explicit maintainer approval.
autonomy_level: L0
max_autonomy_level: L1
promotion_requires_human_approval: true
block_ai_attribution: true
blocked_paths:
  - .env
  - .env.*
  - .rea/policy.yaml
  - .rea/HALT
  - CODEOWNERS
  - SECURITY.md
  - THREAT_MODEL.md
  - secrets/
  - credentials/
  # 0.49.0 — gates Write/Edit tool calls targeting `package.json`.
  # Pairs with the always-on `bootstrap_allowlist` (schema default):
  # the allowlist trusts a CLI-missing PM command only when
  # `package.json` declares `@bookedsolid/rea`, so blocking AGENT
  # edits to the manifest narrows the Edit/Write-tier forge surface.
  # PM-induced writes are explicitly out of scope (see
  # THREAT_MODEL.md §5.23 "Out of scope") — a path-based blocklist
  # cannot distinguish agent edits from PM-tool writes.
  - package.json
notification_channel: ''
context_protection:
  delegate_to_subagent:
    - pnpm run build
    - pnpm run test
  max_bash_output_lines: 100
# 0.30.0 attribution augmenter — opt-in.
# Husky prepare-commit-msg hook appends a Co-Authored-By trailer to
# every commit when enabled. client-engagement profile ships
# `enabled: false`; opt-in lives in repo-local edits to .rea/policy.yaml
# because the identity to roll commits onto is per-developer.
# attribution:
#   co_author:
#     enabled: true
#     name: 'Your Name'
#     email: 'you@example.com'
#     skip_merge: false
attribution:
  co_author:
    enabled: false
# 0.31.0 delegation-advisory nudge — disabled for client-engagement.
# The delegation-advisory.sh PostToolUse hook emits a one-time stderr
# advisory when a session crosses `threshold` write-class tool calls
# without dispatching a curated specialist. Client projects vary too
# much in their delegation conventions to ship the nudge on by
# default — opt in per-repo via .rea/policy.yaml:
#   delegation_advisory:
#     enabled: true
#     threshold: 25
delegation_advisory:
  enabled: false
