# profiles/bst-internal.yaml
# Booked Solid internal projects. Mirrors the current .rea/policy.yaml in the
# rea repository itself — this is the canonical dogfood profile.
autonomy_level: L1
max_autonomy_level: L2
promotion_requires_human_approval: true
block_ai_attribution: true
blocked_paths:
  - .env
  - .env.*
  - .rea/policy.yaml
  - .rea/HALT
  - CODEOWNERS
  - .github/workflows/release.yml
  - SECURITY.md
  - THREAT_MODEL.md
notification_channel: ""
# G9: Booked-internal consumers retain the stricter 0.2.x posture — a single
# literal injection match at write/destructive tier denies (does not merely
# warn). External profiles (open-source, client-engagement, minimal, lit-wc)
# inherit the schema default `false` so upgrading 0.2.x consumers are not
# silently tightened.
injection:
  suspicious_blocks_writes: true
context_protection:
  delegate_to_subagent:
    - pnpm run build
    - pnpm run test
    - pnpm run lint
  max_bash_output_lines: 100
# 0.18.1+ helixir #9: enable audit log rotation by default for
# bst-internal. Long sessions accumulate 100s of push_gate.reviewed
# entries; without rotation the audit file grows unbounded. The empty
# `rotation: {}` block opts in to the documented defaults — 50 MiB
# OR 30 days, whichever arrives first. Rotation marker preserves the
# hash chain across the boundary.
audit:
  rotation: {}
# 0.20.1 helix-round-N P2: rea's own architecture-sensitive paths.
# Hardcoded into the hook before this release; now policy-driven so
# consumer projects don't get rea-source patterns advisory-warning on
# their own `src/types/` directories. Empty (or unset) on other
# profiles = silent no-op. Operators add their own
# architecture-sensitive paths here on a per-project basis.
architecture_review:
  patterns:
    - src/types/
    - src/gateway/
    - src/config/
    - src/cli/commands/init/
    - hooks/_lib/
    - templates/
    - profiles/
