# profiles/bst-internal.yaml
# Booked Solid internal projects. Mirrors the current .rea/policy.yaml in the
# rea repository itself — this is the canonical dogfood profile.
autonomy_level: L1
max_autonomy_level: L2
promotion_requires_human_approval: true
block_ai_attribution: true
blocked_paths:
  - .env
  - .env.*
  - .rea/policy.yaml
  - .rea/HALT
  - CODEOWNERS
  - .github/workflows/release.yml
  - SECURITY.md
  - THREAT_MODEL.md
  # 0.49.0 — gates Write/Edit/MultiEdit/NotebookEdit tool calls
  # targeting `package.json`. The bootstrap allowlist passes a
  # CLI-missing PM payload through ONLY when `package.json` already
  # declares `@bookedsolid/rea`, so blocking AGENT edits to the
  # manifest narrows the Edit/Write-tier forge surface (an attacker
  # can no longer add the declaration via Edit then invoke the
  # allowed PM command). PM-induced writes to the manifest are
  # explicitly out of scope (see THREAT_MODEL.md §5.23 "Out of
  # scope"): a path-based blocklist cannot distinguish agent edits
  # from PM-tool writes. The static manifest-write detector that
  # would close that gap was deliberately removed in R17;
  # defending against agent-initiated PM mutations needs a
  # different abstraction (process-tree-aware policy / per-tool
  # capability tokens) — not shipped in 0.49.0.
  - package.json
notification_channel: ''
# G9: Booked-internal consumers retain the stricter 0.2.x posture — a single
# literal injection match at write/destructive tier denies (does not merely
# warn). External profiles (open-source, client-engagement, minimal, lit-wc)
# inherit the schema default `false` so upgrading 0.2.x consumers are not
# silently tightened.
injection:
  suspicious_blocks_writes: true
context_protection:
  delegate_to_subagent:
    - pnpm run build
    - pnpm run test
    - pnpm run lint
  max_bash_output_lines: 100
# 0.18.1+ helixir #9: enable audit log rotation by default for
# bst-internal. Long sessions accumulate 100s of push_gate.reviewed
# entries; without rotation the audit file grows unbounded. The empty
# `rotation: {}` block opts in to the documented defaults — 50 MiB
# OR 30 days, whichever arrives first. Rotation marker preserves the
# hash chain across the boundary.
audit:
  rotation: {}
# 0.20.1 helix-round-N P2: rea's own architecture-sensitive paths.
# Hardcoded into the hook before this release; now policy-driven so
# consumer projects don't get rea-source patterns advisory-warning on
# their own `src/types/` directories. Empty (or unset) on other
# profiles = silent no-op. Operators add their own
# architecture-sensitive paths here on a per-project basis.
architecture_review:
  patterns:
    - src/types/
    - src/gateway/
    - src/config/
    - src/cli/commands/init/
    - hooks/_lib/
    - templates/
    - profiles/
# 0.30.0 attribution augmenter — opt-in.
# Husky prepare-commit-msg hook appends a Co-Authored-By trailer to
# every commit when enabled. Even the bst-internal profile ships
# `enabled: false` so other BST contributors using the profile don't
# silently route their commits onto the profile author's GitHub
# heatmap; opt-in lives in repo-local edits to .rea/policy.yaml
# because the identity to roll commits onto is per-developer.
# attribution:
#   co_author:
#     enabled: true
#     name: 'Your Name'
#     email: 'you@example.com'
#     skip_merge: false
attribution:
  co_author:
    enabled: false
# 0.31.0 delegation-advisory nudge — enabled for bst-internal.
# The delegation-advisory.sh PostToolUse hook emits a one-time stderr
# advisory when a session crosses `threshold` write-class tool calls
# (Bash/Edit/Write/MultiEdit/NotebookEdit) without dispatching a
# curated specialist. Advisory only — never blocks a tool call. BST's
# own delegation discipline (CLAUDE.md routes all non-trivial work
# through rea-orchestrator) is load-bearing, so the nudge ships on.
# `exempt_subagents` omitted → the schema default applies
# (general-purpose, Explore, Plan, output-style-setup, statusline-setup
# don't count as real delegation).
delegation_advisory:
  enabled: true
  threshold: 25
# 0.49.0 bootstrap allowlist (P3-1) — explicit declaration for parity
# with the dogfood `.rea/policy.yaml`. The other five shipped profiles
# (open-source*, client-engagement, lit-wc, minimal) inherit the zod
# schema default (`enabled: true`), so they need no entry here. The
# bst-internal profile pins it so the operator-visible policy file
# clearly states the position rather than relying on schema defaults.
# The allowlist passes a single-segment pnpm install / npm ci / yarn /
# corepack invocation through when (a) the rea CLI is unreachable, (b)
# the consumer's package.json declares `@bookedsolid/rea`, and (c)
# every other precondition (single-segment payload, exact argv shape,
# audit emission OK) holds. See hooks/_lib/bootstrap-allowlist.sh.
bootstrap_allowlist:
  enabled: true
