# profiles/open-source.yaml
# Public OSS repositories. Slightly looser autonomy, strict attribution rules,
# and sensitive files flagged for human-only edits.
autonomy_level: L1
max_autonomy_level: L2
promotion_requires_human_approval: true
block_ai_attribution: true
blocked_paths:
  - .env
  - .env.*
  - .rea/policy.yaml
  - .rea/HALT
  - CODEOWNERS
  - LICENSE
  - SECURITY.md
  - .github/workflows/release.yml
  - .github/workflows/publish.yml
notification_channel: ''
# 0.30.0 attribution augmenter — opt-in.
# Husky prepare-commit-msg hook appends a Co-Authored-By trailer to
# every commit when enabled. Profile defaults are off — opt in
# per-repo via .rea/policy.yaml because the identity is per-developer.
# attribution:
#   co_author:
#     enabled: true
#     name: 'Your Name'
#     email: 'you@example.com'
#     skip_merge: false
attribution:
  co_author:
    enabled: false
# 0.31.0 delegation-advisory nudge — disabled for open-source.
# The delegation-advisory.sh PostToolUse hook emits a one-time stderr
# advisory when a session crosses `threshold` write-class tool calls
# without dispatching a curated specialist. "You should delegate more"
# is an opinion not every OSS team shares, so external profiles ship
# `enabled: false` — opt in per-repo via .rea/policy.yaml:
#   delegation_advisory:
#     enabled: true
#     threshold: 25
delegation_advisory:
  enabled: false
