# profiles/minimal.yaml
# Bare policy defaults — nothing profile-specific. Suitable as a starting point
# for a project that wants rea's governance but will tune the rest by hand.
autonomy_level: L1
max_autonomy_level: L2
promotion_requires_human_approval: true
block_ai_attribution: true
blocked_paths:
  - .env
  - .env.*
  # 0.49.0 — gates Write/Edit tool calls targeting `package.json`.
  # The always-on `bootstrap_allowlist` (schema default) trusts a
  # CLI-missing PM payload only when `package.json` declares
  # `@bookedsolid/rea`; without an Edit/Write gate on the manifest,
  # an agent could ADD that declaration first and then route an
  # otherwise-disallowed PM command through the allowlist. PM-
  # induced writes are explicitly out of scope (THREAT_MODEL.md
  # §5.23 "Out of scope"). Operators who deliberately want agent
  # freedom to edit `package.json` should remove this entry AND
  # set `bootstrap_allowlist.enabled: false` in tandem.
  - package.json
notification_channel: ''
# 0.30.0 attribution augmenter — opt-in.
# When enabled: true, the husky prepare-commit-msg hook appends a
# Co-Authored-By trailer to every commit (or every non-merge commit
# when skip_merge: true). Idempotent on email match (case-insensitive).
# Profile defaults are off; opt in per-repo via .rea/policy.yaml —
# the identity to roll commits onto is per-developer.
#
# attribution:
#   co_author:
#     enabled: true
#     name: 'Your Name'
#     email: 'you@example.com'
#     skip_merge: false
attribution:
  co_author:
    enabled: false
# 0.31.0 delegation-advisory nudge — disabled for minimal.
# The delegation-advisory.sh PostToolUse hook emits a one-time stderr
# advisory when a session crosses `threshold` write-class tool calls
# without dispatching a curated specialist. The minimal profile ships
# bare defaults — `enabled: false` keeps it opinion-free. Opt in
# per-repo via .rea/policy.yaml:
#   delegation_advisory:
#     enabled: true
#     threshold: 25
delegation_advisory:
  enabled: false

# 0.51.0 spend-governance (E1 seed) — billing→HALT reflex. ON in EVERY
# profile: unlike delegation_advisory (an opinion, bst-internal-only), a
# billing-class error is unambiguously terminal and the halt reflex has no
# false-positive cost worth the risk. The billing-cap-halt.sh PostToolUse
# hook scans a Bash command's output for a billing signature (spending cap
# / prepayment credits depleted / payment required — DISTINCT from a
# retryable 429) and writes .rea/HALT. `billing_error_response: halt`
# stops everything with no retry; `warn` surfaces a banner only; `off`
# disables the reflex. See THREAT_MODEL.md §5.25 (INCIDENT-2026-07-04,
# denial-of-wallet).
spend_governance:
  enabled: true
  billing_error_response: halt
