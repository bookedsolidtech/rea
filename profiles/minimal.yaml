# profiles/minimal.yaml
# Bare policy defaults — nothing profile-specific. Suitable as a starting point
# for a project that wants rea's governance but will tune the rest by hand.
autonomy_level: L1
max_autonomy_level: L2
promotion_requires_human_approval: true
block_ai_attribution: true
blocked_paths:
  - .env
  - .env.*
notification_channel: ''
# 0.30.0 attribution augmenter — opt-in.
# When enabled: true, the husky prepare-commit-msg hook appends a
# Co-Authored-By trailer to every commit (or every non-merge commit
# when skip_merge: true). Idempotent on email match (case-insensitive).
# Profile defaults are off; opt in per-repo via .rea/policy.yaml —
# the identity to roll commits onto is per-developer.
#
# attribution:
#   co_author:
#     enabled: true
#     name: 'Your Name'
#     email: 'you@example.com'
#     skip_merge: false
attribution:
  co_author:
    enabled: false
# 0.31.0 delegation-advisory nudge — disabled for minimal.
# The delegation-advisory.sh PostToolUse hook emits a one-time stderr
# advisory when a session crosses `threshold` write-class tool calls
# without dispatching a curated specialist. The minimal profile ships
# bare defaults — `enabled: false` keeps it opinion-free. Opt in
# per-repo via .rea/policy.yaml:
#   delegation_advisory:
#     enabled: true
#     threshold: 25
delegation_advisory:
  enabled: false
