# profiles/lit-wc.yaml
# Lit / web component libraries. Typical dev ergonomics; protects publish paths
# and the design-system contract files.
autonomy_level: L1
max_autonomy_level: L2
promotion_requires_human_approval: true
block_ai_attribution: true
blocked_paths:
  - .env
  - .env.*
  - .rea/policy.yaml
  - .rea/HALT
  - CODEOWNERS
  - .github/workflows/release.yml
  - .github/workflows/publish.yml
  - tokens/
  # 0.49.0 — gates Write/Edit tool calls targeting `package.json`.
  # Pairs with the always-on `bootstrap_allowlist` so the
  # "consumer declares @bookedsolid/rea" precondition is meaningful.
  # PM-induced writes are explicitly out of scope (THREAT_MODEL.md
  # §5.23 "Out of scope").
  - package.json
notification_channel: ''
# 0.30.0 attribution augmenter — opt-in.
# Husky prepare-commit-msg hook appends a Co-Authored-By trailer to
# every commit when enabled. lit-wc profile ships `enabled: false`;
# opt-in lives in repo-local edits to .rea/policy.yaml because the
# identity to roll commits onto is per-developer.
# attribution:
#   co_author:
#     enabled: true
#     name: 'Your Name'
#     email: 'you@example.com'
#     skip_merge: false
attribution:
  co_author:
    enabled: false
# 0.31.0 delegation-advisory nudge — disabled for lit-wc.
# The delegation-advisory.sh PostToolUse hook emits a one-time stderr
# advisory when a session crosses `threshold` write-class tool calls
# without dispatching a curated specialist. External profiles ship
# `enabled: false` — opt in per-repo via .rea/policy.yaml:
#   delegation_advisory:
#     enabled: true
#     threshold: 25
delegation_advisory:
  enabled: false

# 0.51.0 spend-governance (E1 seed) — billing→HALT reflex. ON in EVERY
# profile: unlike delegation_advisory (an opinion, bst-internal-only), a
# billing-class error is unambiguously terminal and the halt reflex has no
# false-positive cost worth the risk. The billing-cap-halt.sh PostToolUse
# hook scans a FAILED Bash command's stderr for a provider-specific billing
# signature (spending cap / prepayment credits depleted / credit balance is
# too low / insufficient_quota — DISTINCT from a retryable 429). SEED
# DEFAULT `warn`: banner + audit, NO freeze — a phrase-only global halt
# would false-freeze finance/payments repos that emit the same phrases
# (codex round-12 P1). `halt` is an explicit opt-in that writes .rea/HALT
# and stops everything; `off` disables. The default flips to `halt` once
# PR2's metered-endpoint scoping lands. See THREAT_MODEL.md §5.25
# (INCIDENT-2026-07-04, denial-of-wallet).
spend_governance:
  enabled: true
  billing_error_response: warn
